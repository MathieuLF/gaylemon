<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Gaylémon Palworld</title>
  <desc id="description">Carte sociale illustrée du serveur communautaire Gaylémon.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#063243"/>
      <stop offset="0.58" stop-color="#126d6b"/>
      <stop offset="1" stop-color="#43b77d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf4"/>
      <stop offset="1" stop-color="#e5f8ee"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b4054"/>
      <stop offset="1" stop-color="#061b29"/>
    </linearGradient>
    <linearGradient id="islandA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9ed67c"/>
      <stop offset="1" stop-color="#4ca36e"/>
    </linearGradient>
    <linearGradient id="islandB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1ca73"/>
      <stop offset="1" stop-color="#df8268"/>
    </linearGradient>
    <pattern id="texture" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(22)">
      <path d="M0 0V28" stroke="#c9f4e4" stroke-opacity=".09" stroke-width="2"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#031c29" flood-opacity=".28"/>
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <clipPath id="worldClip">
      <rect x="770" y="55" width="380" height="520" rx="54"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#texture)"/>
  <circle cx="1090" cy="72" r="240" fill="#75e8bd" opacity=".1"/>
  <circle cx="86" cy="616" r="270" fill="#f2c45b" opacity=".08"/>

  <g filter="url(#shadow)">
    <rect x="55" y="55" width="680" height="520" rx="46" fill="url(#panel)"/>
  </g>

