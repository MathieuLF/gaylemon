server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    etag on;
    sendfile on;
    tcp_nopush on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/plain;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location = /terminal {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /terminal.html =404;
    }

    location = /terminal/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /terminal.html =404;
    }

    location = /Terminal {
        return 301 $scheme://$http_host/terminal;
    }

    location = /Terminal/ {
        return 301 $scheme://$http_host/terminal/;
    }

    location = /github {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /github.html =404;
    }

    location = /github/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /github.html =404;
    }

    location = /Github {
        return 301 $scheme://$http_host/github;
    }

    location = /Github/ {
        return 301 $scheme://$http_host/github/;
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "public, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /assets/social/gaylemon-social-card.png {
        add_header Cache-Control "public, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ^~ /assets/fonts/ {
        add_header Cache-Control "public, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ^~ /assets/game/ {
        add_header Cache-Control "public, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /data/metrics.json {
        return 404;
    }

    location = /data/stats.json {
        return 404;
    }

    location ~ ^/data/.*\.(log|pid)$ {
        return 404;
    }

    location ~ ^/data/.*\.json$ {
        add_header Cache-Control "no-store" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri =404;
    }

    location ~* \.(?:css|js)$ {
        add_header Cache-Control "public, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
