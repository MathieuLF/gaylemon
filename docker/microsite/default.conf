server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    etag on;
    sendfile on;
    tcp_nopush on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/plain;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;

    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location = /terminal {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /terminal.html =404;
    }

    location = /terminal/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /terminal.html =404;
    }

    location = /Terminal {
        return 301 $scheme://$http_host/terminal;
    }

    location = /Terminal/ {
        return 301 $scheme://$http_host/terminal/;
    }

    location = /resume {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /resume.html =404;
    }

    location = /resume/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /resume.html =404;
    }

    location = /Resume {
        return 301 $scheme://$http_host/resume;
    }

    location = /Resume/ {
        return 301 $scheme://$http_host/resume/;
    }

    location = /classements {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /classements.html =404;
    }

    location = /classements/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /classements.html =404;
    }

    location = /Classements {
        return 301 $scheme://$http_host/classements;
    }

    location = /Classements/ {
        return 301 $scheme://$http_host/classements/;
    }

    location = /carte {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /carte.html =404;
    }

    location = /carte/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /carte.html =404;
    }

    location = /Carte {
        return 301 $scheme://$http_host/carte;
    }

    location = /Carte/ {
        return 301 $scheme://$http_host/carte/;
    }

    location = /evenements {
        return 301 $scheme://$http_host/terminal;
    }

    location = /echos {
        return 301 $scheme://$http_host/terminal;
    }

    location = /aventuriers {
        return 301 $scheme://$http_host/;
    }

    location = /github {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /github.html =404;
    }

    location = /github/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files /github.html =404;
    }

    location = /Github {
        return 301 $scheme://$http_host/github;
    }

    location = /Github/ {
        return 301 $scheme://$http_host/github/;
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cloudflare-CDN-Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "public, max-age=3600, must-revalidate" always;
        add_header Cloudflare-CDN-Cache-Control "public, max-age=3600, must-revalidate" always;
        try_files $uri =404;
    }

    location = /assets/favicon.svg {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cloudflare-CDN-Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /assets/social/gaylemon-social-card.png {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cloudflare-CDN-Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ^~ /assets/fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cloudflare-CDN-Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /assets/game/.source-commit {
        return 404;
    }

    location ^~ /assets/game/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cloudflare-CDN-Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~ ^/data/public-[A-Za-z0-9_.-]+\.json$ {
        add_header Cache-Control "no-store" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri =404;
    }

    location ~ ^/data/players/[A-Za-z0-9-]+\.json$ {
        add_header Cache-Control "no-store" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri =404;
    }

    location /data/ {
        return 404;
    }

    location ~* \.(?:css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cloudflare-CDN-Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
