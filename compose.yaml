name: gaylemon

services:
  microsite:
    image: nginx:1.27-alpine
    container_name: gaylemon-microsite
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GAYLEMON_MICROSITE_PORT:-8787}:80"
    volumes:
      - ./portal:/usr/share/nginx/html:ro
      - ./docker/microsite/default.conf:/etc/nginx/conf.d/default.conf:ro
