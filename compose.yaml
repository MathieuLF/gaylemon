name: gaylemon

services:
  palworld-api-tunnel:
    build:
      context: .
      dockerfile: docker/palworld-api-tunnel/Dockerfile
    image: gaylemon-palworld-api-tunnel:latest
    container_name: gaylemon-palworld-api-tunnel
    restart: unless-stopped
    environment:
      GAYLEMON_SSH_ALIAS: ${GAYLEMON_SSH_ALIAS:-palworld}
      GAYLEMON_API_LOCAL_PORT: ${GAYLEMON_API_LOCAL_PORT:-8212}
      GAYLEMON_API_REMOTE_PORT: ${GAYLEMON_API_REMOTE_PORT:-8212}
    ports:
      - "127.0.0.1:${GAYLEMON_API_LOCAL_PORT:-8212}:${GAYLEMON_API_LOCAL_PORT:-8212}"
    volumes:
      - type: bind
        source: ${GAYLEMON_SSH_DIR:-${USERPROFILE}/.ssh}
        target: /ssh-src
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 \"$${GAYLEMON_API_LOCAL_PORT:-8212}\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  microsite:
    image: nginx:1.27-alpine
    container_name: gaylemon-microsite
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GAYLEMON_MICROSITE_PORT:-8787}:80"
    volumes:
      - ./portal:/usr/share/nginx/html:ro
      - ./docker/microsite/default.conf:/etc/nginx/conf.d/default.conf:ro
