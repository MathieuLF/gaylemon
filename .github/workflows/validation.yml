name: Validation

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  ubuntu:
    name: Python, Bash, JavaScript et Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Tests Python
        run: python -m unittest discover -s server/tests -p "test_*.py" -v
      - name: Syntaxe Bash
        run: find server/bin -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Syntaxe JavaScript
        run: node --check portal/assets/app.js
      - name: Configuration Compose
        run: docker compose config --quiet

  windows:
    name: PowerShell et exclusions Git
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validation du dépôt
        shell: powershell
        run: .\scripts\valider-depot.ps1 -SansDocker -SansTestsPython -SansBash
